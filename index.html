<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StockWatch — Market Predictor</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1565C0;
    --blue-light: #42A5F5;
    --blue-bg: #BBDEFB;
    --blue-pale: #E3F2FD;
    --nav-bg: #1565C0;
    --page-bg: #90CAF9;
    --surface: #ffffff;
    --surface-2: #f0f7ff;
    --text: #0d1b2a;
    --text-muted: #4a6080;
    --border: rgba(21,101,192,0.18);
    --green: #2E7D32;
    --red: #C62828;
    --amber: #E65100;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(21,101,192,0.10);
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a, .nav-links button {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .nav-links a:hover, .nav-links button:hover { color: #fff; }

  /* PAGE WRAPPER */
  .page {
    min-height: calc(100vh - 52px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* AUTH FORMS */
  .auth-card {
    width: 100%;
    max-width: 520px;
    padding: 2.5rem 2.5rem 3rem;
  }
  .auth-title {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 2rem;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #c5d9f0;
    border-radius: 6px;
    background: #ddeeff;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .form-group input:focus {
    border-color: var(--blue);
    background: #fff;
  }
  .auth-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.75rem;
    gap: 1rem;
  }
  .auth-actions-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    margin-top: 1.75rem;
  }
  .btn {
    padding: 8px 22px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }
  .btn-primary {
    background: var(--nav-bg);
    color: #fff;
    border-color: var(--nav-bg);
  }
  .btn-primary:hover { background: #0d47a1; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--surface-2); }
  .btn-ghost {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    text-decoration: underline;
    padding: 0;
  }
  .or-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .or-btn {
    width: 100%;
    padding: 9px;
    text-align: center;
    background: #ddeeff;
    border: 1px solid #c5d9f0;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
  }
  .or-btn:hover { background: #c9dcf0; }

  /* ERROR / SUCCESS */
  .form-error {
    color: var(--red);
    font-size: 12px;
    margin-top: 4px;
  }
  .alert {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 1rem;
  }
  .alert-danger { background: #ffebee; color: var(--red); border: 1px solid #ef9a9a; }

  /* WATCHLIST */
  .watchlist-page { width: 100%; max-width: 640px; }
  .search-box {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow);
  }
  .search-box h3 {
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  .search-input-wrap { position: relative; }
  .search-input-wrap input {
    width: 100%;
    padding: 9px 14px;
    border: 1px solid #c5d9f0;
    border-radius: 6px;
    background: #ddeeff;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  .search-input-wrap input:focus { border-color: var(--blue); background: #fff; }

  .stock-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 0.75rem;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .stock-card:hover {
    box-shadow: 0 4px 20px rgba(21,101,192,0.18);
    transform: translateY(-1px);
  }
  .trend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .trend-up { background: var(--green); }
  .trend-down { background: var(--red); }
  .trend-neutral { background: var(--amber); }
  .stock-logo {
    width: 80px;
    height: 48px;
    object-fit: contain;
    border-radius: 4px;
    background: #f0f0f0;
    flex-shrink: 0;
  }
  .stock-logo-placeholder {
    width: 80px;
    height: 48px;
    border-radius: 4px;
    background: #e3edf9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .stock-info { flex: 1; }
  .stock-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .stock-ticker { font-size: 12px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
  .stock-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    text-align: right;
  }
  .price-up { color: var(--green); }
  .price-down { color: var(--red); }
  .price-neutral { color: var(--amber); }

  /* DETAIL PAGE */
  .detail-page { width: 100%; max-width: 900px; }
  .detail-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .detail-stock-name { font-size: 22px; font-weight: 700; }
  .detail-ticker {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-left: auto;
  }
  .badge-bullish { background: #e8f5e9; color: var(--green); }
  .badge-bearish { background: #ffebee; color: var(--red); }
  .badge-neutral { background: #fff3e0; color: var(--amber); }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1.25rem;
  }
  .chart-card h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .chart-wrap { position: relative; height: 220px; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 1.25rem;
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--blue-pale); }

  /* LOADING */
  .spinner {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 120px;
  }
  .spinner::after {
    content: '';
    width: 28px;
    height: 28px;
    border: 3px solid #c5d9f0;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

const TOKEN_KEY = 'sw_token';
const USER_KEY = 'sw_user';
const saveAuth = (token, user) => {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(USER_KEY, JSON.stringify(user));
};
const clearAuth = () => {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
};
const getToken = () => localStorage.getItem(TOKEN_KEY);
const getUser = () => {
  try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
};

};

const API_URL = "http://localhost:5000/api";
//LOGIN PAGE 
function LoginPage({ setPage, onLogin }) {
  const [form, setForm] = useState({ username: '', password: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

 const handleSubmit = async () => {
  setError('');

  if (!form.username || !form.password) {
    setError('Please fill in all fields.');
    return;
  }

  setLoading(true);

  try {
    const response = await fetch(`${API_URL}/auth/login`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email: form.username,
        password: form.password
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Login failed');
    }

    localStorage.setItem('token', data.token);

    saveAuth(data.token, {
      username: data.email,
      role: data.role
    });

    onLogin();

  } catch (err) {
    setError(err.message);
  }

  setLoading(false);
};

  return (
    <div className="page">
      <div className="card auth-card">
        <h2 className="auth-title">Log In</h2>
        {error && <div className="alert alert-danger">{error}</div>}
        <div className="form-group">
          <label>Username</label>
          <input type="text" placeholder=""
            value={form.username}
            onChange={e => setForm({...form, username: e.target.value})}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          />
        </div>
        <div className="form-group">
          <label>Password</label>
          <input type="password" placeholder=""
            value={form.password}
            onChange={e => setForm({...form, password: e.target.value})}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          />
        </div>
        <div className="auth-actions">
          <button className="btn btn-secondary" onClick={() => setPage('forgot')}>Forgot Password</button>
          <button className="btn btn-primary" onClick={handleSubmit} disabled={loading}>
            {loading ? 'Logging in…' : 'Log In'}
          </button>
        </div>
        <div className="or-divider">Or</div>
        <button className="or-btn" onClick={() => setPage('register')}>Register</button>
        <p style={{textAlign:'center', marginTop:'0.75rem', fontSize:'12px', color:'var(--text-muted)'}}>
          Demo: username <strong>demo</strong> / password <strong>password</strong>
        </p>
      </div>
    </div>
  );
}

// REGISTER PAGE 
function RegisterPage({ setPage }) {
  const [form, setForm] = useState({ username: '', email: '', password: '', confirm: '' });
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const handleSubmit = async () => {
  setError('');

  if (!form.username || !form.email || !form.password || !form.confirm) {
    setError('All fields are required.');
    return;
  }

  if (form.password !== form.confirm) {
    setError('Passwords do not match.');
    return;
  }

  if (form.password.length < 6) {
    setError('Password must be at least 6 characters.');
    return;
  }

  try {
    const response = await fetch(`${API_URL}/auth/register`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email: form.email,
        password: form.password
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || 'Registration failed');
    }

    setSuccess(true);

    setTimeout(() => setPage('login'), 1800);

  } catch (err) {
    setError(err.message);
  }
};

  if (success) return (
    <div className="page">
      <div className="card auth-card" style={{textAlign:'center', padding:'3rem'}}>
        <div style={{fontSize:'48px', marginBottom:'1rem'}}>✅</div>
        <h2 style={{marginBottom:'0.5rem'}}>Account created!</h2>
        <p style={{color:'var(--text-muted)', fontSize:'14px'}}>Redirecting to login…</p>
      </div>
    </div>
  );

  return (
    <div className="page">
      <div className="card auth-card">
        <h2 className="auth-title">Sign In</h2>
        {error && <div className="alert alert-danger">{error}</div>}
        <div className="form-group">
          <label>Username</label>
          <input type="text" value={form.username} onChange={e => setForm({...form, username: e.target.value})} />
        </div>
        <div className="form-group">
          <label>Email</label>
          <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
        </div>
        <div className="form-group">
          <label>Create Password</label>
          <input type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
        </div>
        <div className="form-group">
          <label>Enter Password</label>
          <input type="password" value={form.confirm} onChange={e => setForm({...form, confirm: e.target.value})} />
        </div>
        <div className="auth-actions">
          <button className="btn btn-secondary" onClick={() => setPage('login')}>← Back</button>
          <button className="btn btn-primary" onClick={handleSubmit}>Sign In</button>
        </div>
      </div>
    </div>
  );
}

// FORGOT PASSWORD PAGE 
function ForgotPage({ setPage }) {
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  return (
    <div className="page">
      <div className="card auth-card">
        <h2 className="auth-title">Forgot Password</h2>
        {!sent ? (<>
          <div className="form-group">
            <label>Email address</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" />
          </div>
          <div className="auth-actions">
            <button className="btn btn-secondary" onClick={() => setPage('login')}>← Back</button>
            <button className="btn btn-primary" onClick={() => email && setSent(true)}>Send Reset Link</button>
          </div>
        </>) : (
          <div style={{textAlign:'center', padding:'1rem 0 2rem'}}>
            <div style={{fontSize:'40px', marginBottom:'1rem'}}>📧</div>
            <p style={{marginBottom:'1rem', color:'var(--text-muted)'}}>Reset link sent to <strong>{email}</strong></p>
            <button className="btn btn-primary" onClick={() => setPage('login')}>Back to Login</button>
          </div>
        )}
      </div>
    </div>
  );
}

// WATCHLIST PAGE 
function WatchlistPage({ setPage, setSelectedStock }) {
  const [query, setQuery] = useState('');
  const filtered = STOCKS.filter(s =>
    s.name.toLowerCase().includes(query.toLowerCase()) ||
    s.ticker.toLowerCase().includes(query.toLowerCase())
  );

  const handleSelect = (stock) => {
    setSelectedStock(stock);
    setPage('detail');
  };

  const trendIcon = (t) => t === 'up' ? '▲' : t === 'down' ? '▼' : '●';
  const trendClass = (t) => t === 'up' ? 'trend-up' : t === 'down' ? 'trend-down' : 'trend-neutral';
  const priceClass = (t) => t === 'up' ? 'price-up' : t === 'down' ? 'price-down' : 'price-neutral';

  const LogoPlaceholder = ({ stock }) => (
    LOGOS[stock.id]
      ? <img src={LOGOS[stock.id]} alt={stock.name} className="stock-logo" />
      : <div className="stock-logo-placeholder" style={{background: stock.bg, color: stock.color}}>{stock.ticker}</div>
  );

  return (
    <div className="page">
      <div className="watchlist-page">
        <div className="search-box">
          <h3>Search</h3>
          <div className="search-input-wrap">
            <input
              type="text"
              placeholder="Enter the stock"
              value={query}
              onChange={e => setQuery(e.target.value)}
            />
          </div>
        </div>
        {filtered.map(stock => (
          <div className="stock-card" key={stock.id} onClick={() => handleSelect(stock)}>
            <span className={`trend-dot ${trendClass(stock.trend)}`} title={stock.trend} />
            <LogoPlaceholder stock={stock} />
            <div className="stock-info">
              <div className="stock-name">{stock.name}</div>
              <div className="stock-ticker">{stock.ticker}</div>
            </div>
            <div className={`stock-price ${priceClass(stock.trend)}`}>
              <div>{stock.price}</div>
              <div style={{fontSize:'11px'}}>{trendIcon(stock.trend)} {stock.change}</div>
            </div>
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{textAlign:'center', padding:'2rem', color:'var(--text-muted)', background:'var(--surface)', borderRadius:'var(--radius)'}}>
            No stocks found for "{query}"
          </div>
        )}
      </div>
    </div>
  );
}

//STOCK DETAILS PAGE 
function StockDetailPage({ stock, setPage }) {
  const historicalRef = useRef(null);
  const predictionRef = useRef(null);
  const chartInstances = useRef({});

  useEffect(() => {
    const hist = genHistorical();
    const pred = genPrediction(hist);

    const destroy = (key) => {
      if (chartInstances.current[key]) {
        chartInstances.current[key].destroy();
        delete chartInstances.current[key];
      }
    };

    if (historicalRef.current) {
      destroy('hist');
      chartInstances.current['hist'] = new Chart(historicalRef.current, {
        type: 'line',
        data: {
          labels: labels30,
          datasets: [{
            label: 'Price',
            data: hist,
            borderColor: '#E53935',
            backgroundColor: 'rgba(229,57,53,0.08)',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { font: { size: 9 }, maxTicksLimit: 6 }, grid: { display: false } },
            y: { ticks: { font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
          }
        }
      });
    }

    if (predictionRef.current) {
      destroy('pred');
      const predLabels = [...labels30.slice(-5), ...labels15];
      const actualPad = [...hist.slice(-5), ...Array(15).fill(null)];
      const predPad = [...Array(5).fill(null), ...pred];

      chartInstances.current['pred'] = new Chart(predictionRef.current, {
        type: 'line',
        data: {
          labels: predLabels,
          datasets: [
            {
              label: 'actual',
              data: actualPad,
              borderColor: '#E53935',
              borderWidth: 1.5,
              pointRadius: 0,
              tension: 0.3,
            },
            {
              label: 'predictions using xgboost',
              data: predPad,
              borderColor: '#1565C0',
              borderDash: [4,3],
              borderWidth: 1.5,
              pointRadius: 0,
              tension: 0.3,
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: { font: { size: 10 }, boxWidth: 20, padding: 8 }
            }
          },
          scales: {
            x: { ticks: { font: { size: 9 }, maxTicksLimit: 6 }, grid: { display: false } },
            y: { ticks: { font: { size: 9 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
          }
        }
      });
    }

    return () => { destroy('hist'); destroy('pred'); };
  }, [stock]);

  const badgeClass = stock.trend === 'up' ? 'badge-bullish' : stock.trend === 'down' ? 'badge-bearish' : 'badge-neutral';
  const badgeText = stock.trend === 'up' ? '▲ Bullish' : stock.trend === 'down' ? '▼ Bearish' : '● Neutral';

  return (
    <div className="page">
      <div className="detail-page">
        <button className="back-btn" onClick={() => setPage('watchlist')}>← Back</button>
        <div className="detail-header">
          <div>
            <div className="detail-stock-name">{stock.name}</div>
            <div className="detail-ticker">{stock.ticker} · {stock.price}</div>
          </div>
          <span className={`badge ${badgeClass}`}>{badgeText}</span>
        </div>
        <div className="charts-grid">
          <div className="chart-card">
            <h3>Historical data for the certain stock</h3>
            <div className="chart-wrap">
              <canvas ref={historicalRef}></canvas>
            </div>
          </div>
          <div className="chart-card">
            <h3>Prediction data for the certain stock</h3>
            <div className="chart-wrap">
              <canvas ref={predictionRef}></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

//APP 
function App() {
  const [page, setPage] = useState(() => getToken() ? 'watchlist' : 'login');
  const [isLoggedIn, setIsLoggedIn] = useState(() => !!getToken());
  const [selectedStock, setSelectedStock] = useState(null);

  const handleLogin = () => { setIsLoggedIn(true); setPage('watchlist'); };
  const handleLogout = () => { clearAuth(); setIsLoggedIn(false); setPage('login'); };

  const renderPage = () => {
    switch(page) {
      case 'login': return <LoginPage setPage={setPage} onLogin={handleLogin} />;
      case 'register': return <RegisterPage setPage={setPage} />;
      case 'forgot': return <ForgotPage setPage={setPage} />;
      case 'watchlist': return isLoggedIn
        ? <WatchlistPage setPage={setPage} setSelectedStock={setSelectedStock} />
        : <LoginPage setPage={setPage} onLogin={handleLogin} />;
      case 'detail': return selectedStock
        ? <StockDetailPage stock={selectedStock} setPage={setPage} />
        : <WatchlistPage setPage={setPage} setSelectedStock={setSelectedStock} />;
      default: return <LoginPage setPage={setPage} onLogin={handleLogin} />;
    }
  };

  return (
    <>
      <Nav page={page} setPage={setPage} isLoggedIn={isLoggedIn} onLogout={handleLogout} />
      {renderPage()}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
